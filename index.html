<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | QR code component</title>

</head>
<body>
  <main id="QRCodeCard">
    <img id="CodeImage" src="./images/image-qr-code.png" alt="QR code leading to https://www.frontendmentor.io">
    <h1 id="Title">Improve your front-end skills by building projects</h1>
    <p id="Legend">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </main>
  
  <footer class="attribution">
    <p id="Challenge">Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.</p>
    <p id="Code">Coded by <a href="https://github.com/charbel-imad">Charbel Imad</a>.</p>
  </footer>
</body>
</html>
